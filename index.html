<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boda de Laura & Raul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fuentes personalizadas */
        @font-face {
            font-family: 'Tan Giok';
            src: url('fonts/Tan-Giok.woff2') format('woff2');
        }

        @font-face {
            font-family: 'Cy Grotesk Key';
            src: url('fonts/Cy-Grotesk-Key.woff2') format('woff2');
        }

        /* ANIMACIONES */
        
        /* Entrada desde la izquierda para los nombres */
        @keyframes slideInLeft {
            0% {
                opacity: 0;
                transform: translateX(-50px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Aparición suave (fade in) para la fecha */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Tan Giok', serif;
            font-size: 100px !important;
            line-height: 1;
            /* Aplicamos la animación: duración 1.5s, suave */
            animation: slideInLeft 1.5s ease-out forwards;
        }

        .fecha-boda {
            font-family: 'Cy Grotesk Key', sans-serif;
            font-size: 18px !important;
            letter-spacing: 0.2em;
            opacity: 0; /* Empieza invisible */
            /* Animación: dura 1s, empieza tras 1.2s de espera */
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        /* Ajuste para móviles: si el texto es muy grande, baja el tamaño automáticamente */
        @media (max-width: 768px) {
            h1 { font-size: 60px !important; }
        }
    </style>
</head>
<body class="bg-white overflow-hidden">

    <header class="relative bg-cover bg-center bg-no-repeat h-screen flex items-center justify-center" style="background-image: url('hero-background.jpg');">
        
        <div class="absolute inset-0 bg-black opacity-20"></div>

        <div class="relative z-10 text-center px-4">
            
            <!-- Nombres animados -->
            <h1 class="text-white tracking-tight">
                LAURA & RAUL
            </h1>

            <!-- Fecha animada con retraso -->
            <p class="fecha-boda text-white mt-6 uppercase">
                26.09.2026
            </p>

        </div>
    </header>

</body>
</html>
